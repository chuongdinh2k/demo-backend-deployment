name: Build & Deploy to Azure VMSS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: acrmyappdevf7j4li
  ACR_LOGIN_SERVER: acrmyappdevf7j4li.azurecr.io
  RESOURCE_GROUP: rg-myappdev-f7j4li
  VMSS_NAME: vmss-myappdev
  KEY_VAULT_NAME: kv-myappdev-f7j4li
  IMAGE_NAME: myappdev
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    environment: Azure
    name: Build image in ACR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Debug secret and variable presence (safe)
        shell: bash
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          ACR_NAME: ${{ env.ACR_NAME }}
          RESOURCE_GROUP: ${{ env.RESOURCE_GROUP }}
          VMSS_NAME: ${{ env.VMSS_NAME }}
          KEY_VAULT_NAME: ${{ env.KEY_VAULT_NAME }}
        run: |
          set -euo pipefail
          check_var() {
            local name="$1"
            local value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::warning::$name is empty or not set"
            else
              echo "::notice::$name is set"
            fi
          }
          check_var AZURE_CREDENTIALS
          check_var ACR_NAME
          check_var RESOURCE_GROUP
          check_var VMSS_NAME
          check_var KEY_VAULT_NAME

      - name: Build & push image to ACR
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "$IMAGE_NAME:$IMAGE_TAG" \
            --image "$IMAGE_NAME:latest" \
            --file Dockerfile \
            .

  deploy:
    name: Deploy to VMSS instances
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Debug secret and variable presence (safe)
        shell: bash
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          ACR_NAME: ${{ env.ACR_NAME }}
          RESOURCE_GROUP: ${{ env.RESOURCE_GROUP }}
          VMSS_NAME: ${{ env.VMSS_NAME }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          set -euo pipefail
          check_var() {
            local name="$1"
            local value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::warning::$name is empty or not set"
            else
              echo "::notice::$name is set"
            fi
          }
          check_var AZURE_CREDENTIALS
          check_var ACR_NAME
          check_var RESOURCE_GROUP
          check_var VMSS_NAME
          check_var IMAGE_NAME
          check_var IMAGE_TAG

      - name: Substitute variables in deploy script
        run: |
          export ACR_NAME="$ACR_NAME"
          export IMAGE_NAME="$IMAGE_NAME"
          export IMAGE_TAG="$IMAGE_TAG"
          envsubst < scripts/vmss-deploy-app.sh > /tmp/vmss-remote.sh

      - name: Run deploy script on each VMSS instance
        run: |
          set -euo pipefail

          IDS=$(az vmss list-instances \
            -g "$RESOURCE_GROUP" \
            -n "$VMSS_NAME" \
            --query "[].instanceId" -o tsv)

          if [ -z "$IDS" ]; then
            echo "::error::No VMSS instances found for $VMSS_NAME in $RESOURCE_GROUP"
            exit 1
          fi

          for IID in $IDS; do
            echo "==> Deploying to instance $IID"
            az vmss run-command invoke \
              -g "$RESOURCE_GROUP" \
              -n "$VMSS_NAME" \
              --instance-id "$IID" \
              --command-id RunShellScript \
              --scripts @/tmp/vmss-remote.sh
          done

  sync-secrets:
    name: Sync secrets to Key Vault
    runs-on: ubuntu-latest
    needs: deploy
    if: vars.SYNC_KEY_VAULT == 'true'
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Debug secret and variable presence (safe)
        shell: bash
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          APP_ENV: ${{ secrets.APP_ENV }}
          KEY_VAULT_NAME: ${{ env.KEY_VAULT_NAME }}
        run: |
          set -euo pipefail
          check_var() {
            local name="$1"
            local value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::warning::$name is empty or not set"
            else
              echo "::notice::$name is set"
            fi
          }
          check_var AZURE_CREDENTIALS
          check_var APP_ENV
          check_var KEY_VAULT_NAME

      - name: Upload .env to Key Vault
        run: |
          az keyvault secret set \
            --vault-name "$KEY_VAULT_NAME" \
            --name "app-env" \
            --value "${{ secrets.APP_ENV }}"
